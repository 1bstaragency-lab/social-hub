version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: socialhub
      POSTGRES_USER: socialhub
      POSTGRES_PASSWORD: socialhub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://socialhub:socialhub@db:5432/socialhub
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-secret-change-me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-encryption-key-change-me-32-bytes!}
      PLAYWRIGHT_HEADLESS: "true"
      BROWSER_SESSION_DIR: /app/browser_sessions
      UPLOAD_DIR: /app/uploads
    volumes:
      - browser_sessions:/app/browser_sessions
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  # ── Celery Worker (posting + engagement) ────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://socialhub:socialhub@db:5432/socialhub
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-encryption-key-change-me-32-bytes!}
      PLAYWRIGHT_HEADLESS: "true"
      BROWSER_SESSION_DIR: /app/browser_sessions
    volumes:
      - browser_sessions:/app/browser_sessions
      - uploads:/app/uploads
    depends_on:
      - backend
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=4
      -Q posting,engagement,analytics,health

  # ── Celery Beat (scheduler) ────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://socialhub:socialhub@db:5432/socialhub
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - browser_sessions:/app/browser_sessions
    depends_on:
      - worker
    command: celery -A app.workers.celery_app beat --loglevel=info

  # ── Flower (Celery task monitor) ───────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - worker
    command: celery -A app.workers.celery_app flower --port=5555

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  browser_sessions:
  uploads:
